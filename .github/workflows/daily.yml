name: Daily NBA Retrain

on:
  schedule:
    - cron: '0 12 * * *'   # 7am ET (12:00 UTC)
  workflow_dispatch:         # also allow manual trigger

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install nba_api pandas numpy scikit-learn requests

      - name: Update current season data
        run: |
          python training/historical_loader.py --seasons 1
        continue-on-error: false

      - name: Retrain model
        run: |
          python training/train.py
        continue-on-error: false

      - name: Commit updated performance artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PERFORMANCE.md data/model_performance.json || true
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: daily retrain $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
